version: '3.8'

services:
  app:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - .:/workspace
      - hf_cache:/root/.cache/huggingface
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: .
    env_file:
      - .env
    volumes:
      - .:/workspace
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - redis
      - db
    command: celery -A workers.tasks worker --include=workers.link_analysis_task --loglevel=info -Q celery

  ai-comment-worker:
    build: .
    env_file:
      - .env
    volumes:
      - .:/workspace
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - redis
      - db
    command: celery -A workers.ai_comment_task worker --loglevel=info --concurrency=2 -Q ai_comment

  news-agent:
    image: fake-news-detection-system-app
    env_file:
      - .env
    volumes:
      - .:/workspace
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: python -m scrapers.rss_monitor
    restart: unless-stopped

  rss-worker:
    image: fake-news-detection-system-app
    env_file:
      - .env
    volumes:
      - .:/workspace
      - hf_cache:/root/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A workers.rss_ingester worker --loglevel=info --concurrency=1 -Q rss
    restart: unless-stopped

  rss-beat:
    image: fake-news-detection-system-app
    env_file:
      - .env
    volumes:
      - .:/workspace
    depends_on:
      - redis
      - rss-worker
    command: celery -A workers.rss_ingester beat --loglevel=info
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - app

  db:
    image: ankane/pgvector:latest
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
  hf_cache:
